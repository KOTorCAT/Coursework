services:
  backend:
    build: ./backend
    container_name: tasks_backend
    volumes:
      - tasks_data:/app/data
    networks:
      - app-net
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: tasks_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-net
    restart: unless-stopped

volumes:
  tasks_data:

networks:
  app-net:
    driver: bridge